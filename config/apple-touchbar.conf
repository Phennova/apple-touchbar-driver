# Module dependencies and options for Apple Touch Bar (T1/iBridge)
# apple-ib-tb and apple-ib-als depend on apple-ibridge
softdep apple-ib-tb pre: apple-ibridge
softdep apple-ib-als pre: apple-ibridge

# Touch bar idle/dim timeout options:
#   idle_timeout: seconds before display off (default 300, -1=always on, -2=disable)
#   dim_timeout:  seconds before dimming (default -2=auto-calculate)
#   fnmode: 0=fkeys-only, 1=fn-switches (default), 2=inverse, 3=special-only
# options apple-ib-tb idle_timeout=300 dim_timeout=-2 fnmode=1

# --- mac_mode (Level 2 custom rendering) ---
# When set, switches the iBridge to USB Config 2 so the Touch Bar can be
# driven as a raw framebuffer by the appletbdrm driver + a userspace
# renderer (tiny-dfr). In this mode the built-in function-key modes are
# disabled; userspace draws everything.
# options apple-ibridge mac_mode=1
